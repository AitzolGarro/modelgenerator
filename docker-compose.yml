version: "3.8"

# Single-service mode: everything in one container
# Run: docker compose up --build
# Open: http://localhost:8000

services:
  modelgenerator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - model-cache:/root/.cache/huggingface
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  model-cache:
    driver: local
